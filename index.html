<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Head Tracking — Gaze Dots</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0c;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}

  /* ── CANVAS (fills screen, draws dots) ── */
  #dotCanvas{
    position:fixed;inset:0;
    width:100%;height:100%;
    pointer-events:none;
    z-index:10;
  }

  /* ── BACKGROUND IMAGE SLOT ── */
  #bg{
    position:fixed;inset:0;
    width:100%;height:100%;
    object-fit:cover;
    opacity:0.55;
    display:none;
  }

  /* ── STATUS BAR ── */
  #status{
    position:fixed;top:20px;left:50%;transform:translateX(-50%);
    z-index:50;
    display:flex;align-items:center;gap:10px;
    background:rgba(0,0,0,0.65);backdrop-filter:blur(10px);
    padding:8px 18px;border-radius:100px;
    color:#fff;font-size:12px;font-weight:600;letter-spacing:0.08em;
    pointer-events:none;
  }
  #status-dot{width:8px;height:8px;border-radius:50%;background:#444;transition:background 0.3s;}
  #status-dot.loading{background:#f59e0b;animation:blink 1s infinite;}
  #status-dot.active{background:#4ade80;}
  #status-dot.error{background:#ef4444;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

  /* ── HIDDEN WEBCAM ── */
  #webcam{position:fixed;bottom:8px;right:8px;width:120px;height:90px;
    object-fit:cover;border-radius:8px;opacity:0.3;z-index:20;display:none;}
  #webcam.show{display:block;}

  /* ── PANEL ── */
  .panel{
    position:fixed;top:18px;right:18px;width:240px;z-index:50;
    background:rgba(15,15,20,.88);backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.08);border-radius:16px;
    padding:16px 16px 10px;color:#e8e8ee;
  }
  .panel h2{font-size:12px;letter-spacing:.14em;text-transform:uppercase;opacity:.5;margin-bottom:14px;}
  .ctrl{margin-bottom:12px;}
  .ctrl label{display:flex;justify-content:space-between;font-size:11px;opacity:.75;margin-bottom:5px;}
  .ctrl input[type=range]{width:100%;accent-color:#FF0003;}
  .ctrl input[type=file]{font-size:11px;color:#aaa;width:100%;}
  .seg{display:flex;gap:5px;}
  .seg button{
    flex:1;padding:5px 0;font-size:11px;border-radius:7px;cursor:pointer;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#e8e8ee;
  }
  .seg button.on{background:#FF0003;border-color:#FF0003;color:#fff;}
  .divider{height:1px;background:rgba(255,255,255,.07);margin:10px 0;}
</style>
</head>
<body>

<img id="bg" src="" alt=""/>
<canvas id="dotCanvas"></canvas>

<div id="status">
  <div id="status-dot" class="loading"></div>
  <span id="status-text">Loading MediaPipe…</span>
</div>

<video id="webcam" autoplay muted playsinline></video>

<div class="panel">
  <h2>Head Tracking</h2>

  <div class="ctrl">
    <label>Dot size <span id="vDotSize">5</span></label>
    <input id="dotSize" type="range" min="2" max="20" step="1" value="5">
  </div>
  <div class="ctrl">
    <label>Dot opacity <span id="vDotOpacity">0.9</span></label>
    <input id="dotOpacity" type="range" min="0.1" max="1" step="0.05" value="0.9">
  </div>
  <div class="ctrl">
    <label>Trail length <span id="vTrail">80</span></label>
    <input id="trail" type="range" min="10" max="300" step="5" value="80">
  </div>
  <div class="ctrl">
    <label>Fade speed <span id="vFade">120</span> frames</label>
    <input id="fade" type="range" min="10" max="500" step="10" value="120">
  </div>
  <div class="ctrl">
    <label>Smoothing <span id="vSmooth">0.10</span></label>
    <input id="smooth" type="range" min="0.01" max="1" step="0.01" value="0.10">
  </div>

  <div class="divider"></div>

  <div class="ctrl">
    <label>Show webcam</label>
    <div class="seg">
      <button id="camOn">Show</button>
      <button id="camOff" class="on">Hide</button>
    </div>
  </div>

  <div class="ctrl">
    <label>Background image</label>
    <input id="bgFile" type="file" accept="image/*">
  </div>
  <div class="ctrl">
    <label>BG opacity <span id="vBgOp">0.55</span></label>
    <input id="bgOp" type="range" min="0" max="1" step="0.05" value="0.55">
  </div>
</div>

<script type="module">
import { FaceLandmarker, FilesetResolver }
  from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

// ── CONFIG ────────────────────────────────────────────────────────────────────
const CFG = {
  dotSize:    5,
  dotOpacity: 0.9,
  trail:      80,
  fade:       120,
  smooth:     0.10,
};

// ── CANVAS ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('dotCanvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── DOT TRAIL ─────────────────────────────────────────────────────────────────
// Each dot: { x, y, age }  — age increments each frame, fades out
const dots = [];
let smoothX = 0.5, smoothY = 0.5;  // normalized
let hasHead = false;

function addDot(nx, ny) {
  dots.push({ x: nx * canvas.width, y: ny * canvas.height, age: 0 });
  // trim trail
  while (dots.length > CFG.trail) dots.shift();
}

function drawDots() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const dot of dots) {
    dot.age++;
    const alpha = Math.max(0, 1 - dot.age / CFG.fade) * CFG.dotOpacity;
    if (alpha <= 0) continue;
    ctx.beginPath();
    ctx.arc(dot.x, dot.y, CFG.dotSize, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,0,3,${alpha.toFixed(3)})`;
    ctx.fill();
  }
}

// ── HEAD POSITION FROM LANDMARKS ─────────────────────────────────────────────
// Use nose tip (landmark 1) + forehead (168) + chin (152) + cheeks (234, 454)
// weighted centroid → stable screen coordinate
function headCenter(lm) {
  const pts = [
    { lm: lm[1],   w: 4 },  // nose tip
    { lm: lm[168], w: 1 },  // forehead
    { lm: lm[152], w: 1 },  // chin
    { lm: lm[234], w: 1 },  // left cheek
    { lm: lm[454], w: 1 },  // right cheek
  ];
  let wx = 0, wy = 0, wt = 0;
  for (const { lm: p, w } of pts) {
    wx += (1 - p.x) * w;   // mirror: webcam is mirrored
    wy += p.y * w;
    wt += w;
  }
  return { x: wx / wt, y: wy / wt };
}

// ── MEDIAPIPE ─────────────────────────────────────────────────────────────────
const statusDot  = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const webcamEl   = document.getElementById('webcam');

async function start() {
  try {
    statusText.textContent = 'Loading model…';
    const fs = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    const fl = await FaceLandmarker.createFromOptions(fs, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
        delegate: 'GPU',
      },
      outputFaceBlendshapes: false,
      runningMode: 'VIDEO',
      numFaces: 1,
    });

    statusText.textContent = 'Requesting camera…';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } }
    });
    webcamEl.srcObject = stream;
    await new Promise(r => { webcamEl.onloadeddata = r; });

    statusDot.className = 'active';
    statusText.textContent = 'Tracking…';

    let lastT = -1;

    // ── TRACKING LOOP ──
    function track() {
      if (webcamEl.readyState >= 2 && webcamEl.currentTime !== lastT) {
        lastT = webcamEl.currentTime;
        try {
          const res = fl.detectForVideo(webcamEl, performance.now());
          if (res.faceLandmarks?.length > 0) {
            hasHead = true;
            const { x, y } = headCenter(res.faceLandmarks[0]);
            // smooth
            smoothX += (x - smoothX) * CFG.smooth;
            smoothY += (y - smoothY) * CFG.smooth;
            addDot(smoothX, smoothY);
            statusText.textContent = `Head: ${(smoothX*100).toFixed(0)}%, ${(smoothY*100).toFixed(0)}%`;
          } else {
            hasHead = false;
            statusText.textContent = 'No face detected';
          }
        } catch(_) {}
      }
      requestAnimationFrame(track);
    }
    requestAnimationFrame(track);

  } catch(e) {
    statusDot.className = 'error';
    statusText.textContent = 'Camera error: ' + e.message;
    console.error(e);
  }
}

start();

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
function renderLoop() {
  drawDots();
  requestAnimationFrame(renderLoop);
}
requestAnimationFrame(renderLoop);

// ── CONTROLS ─────────────────────────────────────────────────────────────────
function bind(id, valId, parse, key) {
  const el = document.getElementById(id);
  el.addEventListener('input', () => {
    const v = parse(el.value);
    if (valId) document.getElementById(valId).textContent = v;
    CFG[key] = v;
  });
}
bind('dotSize',    'vDotSize',    v => parseInt(v),    'dotSize');
bind('dotOpacity', 'vDotOpacity', v => parseFloat(v),  'dotOpacity');
bind('trail',      'vTrail',      v => parseInt(v),    'trail');
bind('fade',       'vFade',       v => parseInt(v),    'fade');
bind('smooth',     'vSmooth',     v => parseFloat(v),  'smooth');

const bgEl = document.getElementById('bg');
document.getElementById('bgFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  bgEl.src = URL.createObjectURL(file);
  bgEl.style.display = 'block';
});
document.getElementById('bgOp').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  document.getElementById('vBgOp').textContent = v;
  bgEl.style.opacity = v;
});

document.getElementById('camOn').onclick  = () => {
  webcamEl.classList.add('show');
  document.getElementById('camOn').classList.add('on');
  document.getElementById('camOff').classList.remove('on');
};
document.getElementById('camOff').onclick = () => {
  webcamEl.classList.remove('show');
  document.getElementById('camOff').classList.add('on');
  document.getElementById('camOn').classList.remove('on');
};
</script>
</body>
</html>
